services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pickserve
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pickserve
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      VAPID_PUBLIC_KEY: BNGfgJg0GS1xy8GybiwudStALiaqS3zsgJYtALahw-tuEJdH-rpZYGQHpu2T5q0AD0A7PWeVsnxGCQN-gfC7E94
      VAPID_PRIVATE_KEY: GRXoWwKYZRkrhgXfJ77Z7C02yqHnO-kte6j0-W0e25g
      VAPID_SUBJECT: mailto:admin@pickserve.com
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  scoring-worker:
    build: ./workers
    command: python scoring_worker.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pickserve
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    restart: on-failure

  notification-worker:
    build: ./workers
    command: python notification_worker.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pickserve
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      VAPID_PUBLIC_KEY: BNGfgJg0GS1xy8GybiwudStALiaqS3zsgJYtALahw-tuEJdH-rpZYGQHpu2T5q0AD0A7PWeVsnxGCQN-gfC7E94
      VAPID_PRIVATE_KEY: GRXoWwKYZRkrhgXfJ77Z7C02yqHnO-kte6j0-W0e25g
      VAPID_SUBJECT: mailto:admin@pickserve.com
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    restart: on-failure

  ranking-worker:
    build: ./workers
    command: python ranking_worker.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pickserve
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    restart: on-failure

  scheduler:
    build: ./workers
    command: python scheduler.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pickserve
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
      - "3443:443"
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
  rabbitmq_data:
