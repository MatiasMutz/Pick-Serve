name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────────
  # Frontend: TypeScript type-check + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Backend: syntax + import check
  # ─────────────────────────────────────────────
  backend-syntax:
    name: Backend (Syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/database.py
          python -m py_compile backend/models.py
          python -m py_compile backend/schemas.py
          python -m py_compile backend/seed.py
          python -m py_compile backend/events/publisher.py
          python -m py_compile backend/routers/auth.py
          python -m py_compile backend/routers/rounds.py
          python -m py_compile backend/routers/predictions.py
          python -m py_compile backend/routers/admin.py
          python -m py_compile backend/routers/ranking.py
          python -m py_compile backend/routers/notifications.py

  # ─────────────────────────────────────────────
  # Workers: syntax check
  # ─────────────────────────────────────────────
  workers-syntax:
    name: Workers (Syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r workers/requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile workers/base.py
          python -m py_compile workers/models.py
          python -m py_compile workers/scoring_worker.py
          python -m py_compile workers/notification_worker.py
          python -m py_compile workers/ranking_worker.py
          python -m py_compile workers/scheduler.py

  # ─────────────────────────────────────────────
  # Backend: unit tests (SQLite, no external deps)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend (Unit tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///./test_pickserve.db"
          RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"
